<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>JP Market AI Dashboard</title>
  <style>
    body{
      margin:0;
      background:#041b63;
      color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
    }
    .wrap{
      max-width:860px;
      margin:0 auto;
      padding:20px 16px 40px;
    }
    .card{
      border-radius:28px;
      padding:24px;
      margin:18px 0;
      box-shadow:0 10px 30px rgba(0,0,0,.18);
    }
    .hero{
      background:#f0c93d;
      color:#000;
    }
    .panel{
      background:#0c2570;
      color:#fff;
    }
    .title{
      font-size:28px;
      font-weight:900;
      line-height:1.2;
      margin:0 0 16px;
    }
    .big{
      font-size:64px;
      font-weight:900;
      text-align:center;
      margin:26px 0 18px;
    }
    .mid{
      font-size:26px;
      font-weight:800;
      text-align:center;
      margin-bottom:18px;
    }
    .actionbox{
      background:#02020f;
      border-radius:24px;
      padding:20px;
      margin-top:18px;
      color:#fff;
    }
    .label{
      color:#f0c93d;
      font-size:18px;
      font-weight:900;
      margin-bottom:12px;
    }
    .action{
      font-size:30px;
      font-weight:900;
      margin-bottom:10px;
    }
    .line{
      font-size:20px;
      line-height:1.9;
      font-weight:700;
    }
    .ok{ color:#45e37b; }
    .alert{ color:#ff6b6b; }
    .muted{ opacity:.85; }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="card hero">
      <div class="title">JP Market AI Dashboard</div>
      <div id="weather" class="big">--</div>
      <div id="judgement" class="mid">読み込み中…</div>

      <div class="actionbox">
        <div class="label">AI最終指示</div>
        <div id="action" class="action">読込中</div>
        <div id="reason" class="line">理由: --</div>
        <div id="size" class="line">サイズ: --</div>
      </div>
    </div>

    <div class="card panel">
      <div class="title">安全状態</div>
      <div id="status" class="line">状態: --</div>
      <div id="alerts" class="line">警告: --</div>
    </div>

    <div class="card panel">
      <div class="title">ポジション</div>
      <div id="pos" class="line">総ポジション: --</div>
      <div id="pnl" class="line">PnL: --</div>
    </div>

    <div class="card panel">
      <div class="title">更新</div>
      <div id="updated" class="line muted">--</div>
    </div>

  </div>

  <script>
    async function loadJson(path, fallback = {}) {
      try {
        const res = await fetch(path + '?v=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) return fallback;
        return await res.json();
      } catch {
        return fallback;
      }
    }

    function setText(id, value) {
      document.getElementById(id).textContent = value;
    }

    async function main() {
      const execution = await loadJson('./execution.json', {});
      const monitor = await loadJson('./monitor.json', { status: 'OK', alerts: [] });
      const position = await loadJson('./position.json', {});
      const weatherTxt = await fetch('./weather.txt?v=' + Date.now(), { cache: 'no-store' })
        .then(r => r.ok ? r.text() : '')
        .catch(() => '');

      const actionMap = {
        ENTER: '▶ エントリー',
        EXIT: '■ 決済',
        HOLD: '▶ 何もしない'
      };

      const action = execution.action || 'HOLD';
      const side = execution.side ? ' / ' + execution.side : '';
      const reason = execution.reason || '待機';
      const size = execution.size ?? 0;

      const weather = weatherTxt.trim() || '--';
      setText('weather', weather);
      setText('judgement', action === 'ENTER' ? 'エントリー指示' : action === 'EXIT' ? '決済指示' : '待機');
      setText('action', (actionMap[action] || '▶ 何もしない') + side);
      setText('reason', '理由: ' + reason);
      setText('size', 'サイズ: ' + size);

      const statusEl = document.getElementById('status');
      const status = monitor.status || 'OK';
      statusEl.textContent = '状態: ' + status;
      statusEl.className = 'line ' + (status === 'OK' ? 'ok' : 'alert');
      setText('alerts', '警告: ' + ((monitor.alerts && monitor.alerts.length) ? monitor.alerts.join(', ') : 'なし'));

      setText('pos', '総ポジション: ' + (position.total_position ?? 0));
      setText('pnl', 'PnL: ' + (position.pnl ?? 0));
      setText('updated', new Date().toLocaleString('ja-JP'));
    }

    main();
    setInterval(main, 30000);
  </script>
</body>
</html>
