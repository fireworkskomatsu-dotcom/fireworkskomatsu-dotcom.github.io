<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>JP Market AI Dashboard</title>
  <style>
    body{
      margin:0;
      background:#041b63;
      color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
    }
    .wrap{
      max-width:860px;
      margin:0 auto;
      padding:20px 16px 40px;
    }
    .card{
      border-radius:28px;
      padding:24px;
      margin:18px 0;
      box-shadow:0 10px 30px rgba(0,0,0,.18);
    }
    .hero{
      color:#000;
      transition:background .2s ease;
    }
    .hero.yellow{ background:#f0c93d; }
    .hero.green{ background:#49d17d; }
    .hero.red{ background:#ff6b6b; }

    .panel{
      background:#0c2570;
      color:#fff;
    }
    .title{
      font-size:28px;
      font-weight:900;
      line-height:1.2;
      margin:0 0 16px;
    }
    .big{
      font-size:64px;
      font-weight:900;
      text-align:center;
      margin:26px 0 18px;
    }
    .mid{
      font-size:26px;
      font-weight:800;
      text-align:center;
      margin-bottom:18px;
    }
    .actionbox{
      background:#02020f;
      border-radius:24px;
      padding:20px;
      margin-top:18px;
      color:#fff;
    }
    .label{
      color:#f0c93d;
      font-size:18px;
      font-weight:900;
      margin-bottom:12px;
    }
    .action{
      font-size:30px;
      font-weight:900;
      margin-bottom:10px;
    }
    .line{
      font-size:20px;
      line-height:1.9;
      font-weight:700;
    }
    .ok{ color:#45e37b; }
    .alert{ color:#ff6b6b; }
    .muted{ opacity:.85; }
  </style>
</head>
<body>
  <div class="wrap">

    <div id="hero" class="card hero yellow">
      <div class="title">JP Market AI Dashboard</div>
      <div id="weather" class="big">--</div>
      <div id="judgement" class="mid">読み込み中…</div>

      <div class="actionbox">
        <div class="label">AI最終指示</div>
        <div id="action" class="action">読込中</div>
        <div id="reason" class="line">理由: --</div>
        <div id="size" class="line">サイズ: --</div>
      </div>
    </div>

    

<div class="card panel">
  <div class="title">AIコメント</div>
  <div id="ai_commentary" class="line" style="white-space: pre-line;">--</div>
</div>

<div class="card panel">
  <div class="title">AI総合判断</div>
  <div id="ai_status" class="line">状態: --</div>
  <div id="ai_reason" class="line">理由: --</div>
  <div id="ai_regime" class="line">相場: --</div>
  <div id="ai_vol" class="line">ボラ: --</div>
  <div id="ai_go" class="line">本番判定: --</div>
  <div id="ai_shadow" class="line">シャドー成績: --</div>
</div>

<div class="card panel">
      <div class="title">安全状態</div>
      <div id="status" class="line">状態: --</div>
      <div id="alerts" class="line">警告: --</div>
    </div>

    <div class="card panel">
      <div class="title">ポジション</div>
      <div id="pos" class="line">総ポジション: --</div>
      <div id="pnl" class="line">PnL: --</div>
    </div>

    <div class="card panel">
      <div class="title">更新</div>
      <div id="updated" class="line muted">--</div>
    </div>

  </div>

  <script>
    async function loadJson(path, fallback = {}) {
      try {
        const res = await fetch(path + '?v=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) return fallback;
        return await res.json();
      } catch {
        return fallback;
      }
    }

    async function loadText(path, fallback = '') {
      try {
        const res = await fetch(path + '?v=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) return fallback;
        return await res.text();
      } catch {
        return fallback;
      }
    }

    function setText(id, value) {
      document.getElementById(id).textContent = value;
    }

    function setHeroColor(mode) {
      const hero = document.getElementById('hero');
      hero.classList.remove('yellow', 'green', 'red');
      hero.classList.add(mode);
    }

    function decideColor(action, pnl, weatherText) {
      const w = (weatherText || '').trim();

      if (action === 'ENTER') {
        return 'green';
      }
      if (action === 'EXIT') {
        return 'red';
      }
      if (typeof pnl === 'number' && pnl < 0) {
        return 'red';
      }
      if (w.includes('赤') || w.toUpperCase().includes('RISK') || w.toUpperCase().includes('DANGER')) {
        return 'red';
      }
      if (w.includes('緑')) {
        return 'green';
      }
      return 'yellow';
    }

    function decideWeatherLabel(color, weatherText) {
      const w = (weatherText || '').trim();
      if (w) return w;
      if (color === 'green') return '緑';
      if (color === 'red') return '赤';
      return '黄';
    }

    function decideJudgement(action, color) {
      if (action === 'ENTER') return 'エントリー指示';
      if (action === 'EXIT') return '決済指示';
      if (color === 'green') return 'ロング優勢';
      if (color === 'red') return 'ショート優勢 / 危険回避';
      return '様子見';
    }

    async function main() {
      const execution = await loadJson('./execution.json', {});
      const monitor = await loadJson('./monitor.json', { status: 'OK', alerts: [] });
      const position = await loadJson('./position.json', {});
      const weatherTxt = await loadText('./weather.txt', '');

      const actionMap = {
        ENTER: '▶ エントリー',
        EXIT: '■ 決済',
        HOLD: '▶ 何もしない'
      };

      const action = execution.action || 'HOLD';
      const side = execution.side ? ' / ' + execution.side : '';
      const reason = execution.reason || '待機';
      const size = execution.size ?? 0;
      const pnl = Number(position.pnl ?? 0);

      const color = decideColor(action, pnl, weatherTxt);
      const weatherLabel = decideWeatherLabel(color, weatherTxt);
      const judgement = decideJudgement(action, color);

      setHeroColor(color);
      setText('weather', weatherLabel);
      setText('judgement', judgement);
      setText('action', (actionMap[action] || '▶ 何もしない') + side);
      setText('reason', '理由: ' + reason);
      setText('size', 'サイズ: ' + size);

      const statusEl = document.getElementById('status');
      const status = monitor.status || 'OK';
      statusEl.textContent = '状態: ' + status;
      statusEl.className = 'line ' + (status === 'OK' ? 'ok' : 'alert');
      setText('alerts', '警告: ' + ((monitor.alerts && monitor.alerts.length) ? monitor.alerts.join(', ') : 'なし'));

      setText('pos', '総ポジション: ' + (position.total_position ?? 0));
      setText('pnl', 'PnL: ' + (position.pnl ?? 0));
      
      
      const comment = await loadJson('./ai_commentary.json', {});
      setText('ai_commentary', comment.commentary || '--');

      const ai = await loadJson('./ai_report.json', {});
      setText('ai_status', '状態: ' + (ai.ai_status || '--'));
      setText('ai_reason', '理由: ' + (ai.reason || '--'));
      setText('ai_regime', '相場: ' + (ai.market_regime || '--') + ' / ' + (ai.regime_reason || ''));
      setText('ai_vol', 'ボラ: ' + (ai.volatility_mode || '--') + ' / ' + (ai.volatility_reason || ''));
      setText('ai_go', '本番判定: ' + (ai.go_live_status || '--') + ' / ' + (ai.go_live_reason || ''));
      setText('ai_shadow', 'シャドー: ' + (ai.shadow_closed ?? 0) + '件 / 勝率 ' + (ai.shadow_win_rate ?? 0) + '% / PnL ' + (ai.shadow_total_pnl ?? 0));

      setText('updated', new Date().toLocaleString('ja-JP'));
    }

    main();
    setInterval(main, 30000);
  </script>
</body>
</html>
