<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>1321 AI Trading Dashboard</title>
<style>
body{margin:0;background:#061866;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif}
.wrap{max-width:760px;margin:0 auto;padding:16px}
.card{background:#0b1f78;border-radius:22px;margin:14px 0;padding:18px;box-shadow:0 8px 25px rgba(0,0,0,.25)}
h1{font-size:20px;margin:0 0 12px;font-weight:900}
.big{font-size:56px;font-weight:900;color:#ffd84d;line-height:1}
.row{display:flex;justify-content:space-between;gap:16px;border-bottom:1px solid rgba(255,255,255,.12);padding:10px 0;font-size:15px}
.row b{font-size:18px;text-align:right}
.good{color:#66ffb2}.bad{color:#ff7b7b}.yellow{color:#ffd84d}
.reason{font-size:14px;line-height:1.55;white-space:pre-wrap}
.small{opacity:.75;font-size:12px}
</style>
</head>
<body>
<div class="wrap" id="app">loading...</div>

<script>
const yen=v=>{
  const n=Number(v||0);
  const sign=n>0?"+":"";
  return sign+n.toLocaleString()+"円";
};
const pct=v=>(Number(v||0)).toString()+"%";
const row=(k,v)=>`<div class="row"><span>${k}</span><b>${v}</b></div>`;

async function load(){
  const d=await fetch("./core_dashboard.json?ts="+Date.now(),{cache:"no-store"}).then(r=>r.json());

  const t=d.today||{}, p=d.position||{}, pf=d.performance||{}, ai=d.ai||{}, g=d.go_live||{};
  const action=t.decision==="LONG"?"買い":t.decision==="SHORT"?"売り":"見送り";
  const actionClass=t.decision==="LONG"?"good":t.decision==="SHORT"?"bad":"yellow";

  document.getElementById("app").innerHTML=`
    <div class="card">
      <h1>本日の新規指示</h1>
      <div class="big ${actionClass}">${action}</div>
      ${row("銘柄",t.symbol||"1321.T")}
      ${row("現在値",(t.price||"--")+"円")}
      ${row("新規数量",(t.qty||0)+"株")}
      ${row("想定金額",(t.amount||0)+"円")}
      ${row("注文",t.order||"なし")}
      ${row("損切り",t.stop_loss||"-1.0%")}
      ${row("利確",t.take_profit||"2.2%")}
    </div>

    <div class="card">
      <h1>現在の保有ポジション</h1>
      ${row("保有状態",p.status||"保有なし")}
      ${row("建値",(p.entry_price||0)+"円")}
      ${row("現在値",(p.current_price||0)+"円")}
      ${row("含み損益",yen(p.unrealized_yen))}
      ${row("含み率",pct(p.unrealized_pct))}
      ${row("保有日数",(p.held_days||0)+"日")}
      ${row("自動決済判断",p.exit_now?"EXIT":"HOLD")}
      ${row("決済理由",p.exit_reason||"HOLD")}
    </div>

    <div class="card">
      <h1>仮想口座成績</h1>
      ${row("仮想残高",yen(pf.equity).replace("+",""))}
      ${row("実現損益",yen(pf.realized_pnl))}
      ${row("損益率",pct(pf.return_pct))}
      ${row("勝敗",(pf.wins||0)+"勝 "+(pf.losses||0)+"敗")}
      ${row("決済数",(pf.closed_trades||0)+"件")}
      ${row("勝率",pct(pf.win_rate))}
      ${row("今回決済",yen(pf.last_closed_pnl_yen))}
      ${row("今回勝ち",yen(pf.last_win_yen))}
      ${row("今回負け",yen(pf.last_loss_yen))}
    </div>

    <div class="card">
      <h1>AI統合脳</h1>
      ${row("AI脳",ai.brain_status||"--")}
      ${row("Brain Score",ai.brain_score||0)}
      ${row("会議判断",ai.weighted_decision||"--")}
      ${row("LONG",(ai.votes&&ai.votes.LONG)||0)}
      ${row("SHORT",(ai.votes&&ai.votes.SHORT)||0)}
      ${row("SKIP",(ai.votes&&ai.votes.SKIP)||0)}
      ${row("HOLD",(ai.votes&&ai.votes.HOLD)||0)}
    </div>

    <div class="card">
      <h1>Replay / 市場温度</h1>
      ${row("Replay Key",ai.replay_key||"--")}
      ${row("Policy",ai.replay_policy||"--")}
      ${row("期待値",ai.expectancy||0)}
      ${row("Expectancy",ai.expectancy_action||"--")}
      ${row("市場温度",ai.market_temperature||"--")}
      ${row("過熱タイプ",ai.overheat_type||"NONE")}
    </div>

    <div class="card">
      <h1>実弾ゲート</h1>
      ${row("Go Live",g.status||"NOT_READY")}
      ${row("実弾許可",g.allow_real_trade?"YES":"NO")}
      ${row("本番ロック",g.production_locked?"ON":"OFF")}
      ${row("経験数",g.experience_count||0)}
      ${row("決済数",g.closed_trades||0)}
      ${row("残り経験",g.remaining_experience||0)}
      ${row("残り決済",g.remaining_closed||0)}
      <div class="reason">${(g.lock_reasons||[]).join(" / ")}</div>
    </div>

    <div class="card">
      <h1>理由</h1>
      <div class="reason">${(d.reason||[]).join("\n")}</div>
      <div class="small">updated: ${d.updated_at||"--"} / ${d.version||""}</div>
    </div>
  `;
}
load();
setInterval(load,60000);
</script>
</body>
</html>
