  <style>
    body{
      margin:0;
      background:#041b63;
      color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
    }
    .wrap{
      max-width:860px;
      margin:0 auto;
      padding:20px 16px 40px;
    }
    .card{
      border-radius:28px;
      padding:24px;
      margin:18px 0;
      box-shadow:0 10px 30px rgba(0,0,0,.18);
    }
    .hero{
      color:#000;
      transition:background .2s ease;
    }
    .hero.yellow{ background:#f0c93d; }
    .hero.green{ background:#49d17d; }
    .hero.red{ background:#ff6b6b; }

    .panel{
      background:#0c2570;
      color:#fff;
    }
    .title{
      font-size:28px;
      font-weight:900;
      line-height:1.2;
      margin:0 0 16px;
    }
    .big{
      font-size:64px;
      font-weight:900;
      text-align:center;
      margin:26px 0 18px;
    }
    .mid{
      font-size:26px;
      font-weight:800;
      text-align:center;
      margin-bottom:18px;
    }
    .actionbox{
      background:#02020f;
      border-radius:24px;
      padding:20px;
      margin-top:18px;
      color:#fff;
    }
    .label{
      color:#f0c93d;
      font-size:18px;
      font-weight:900;
      margin-bottom:12px;
    }
    .action{
      font-size:30px;
      font-weight:900;
      margin-bottom:10px;
    }
    .line{
      font-size:20px;
      line-height:1.9;
      font-weight:700;
    }
    .ok{ color:#45e37b; }
    .alert{ color:#ff6b6b; }
    .muted{ opacity:.85; }
  
.entry-wrap{
  background:#0b1020;
  border-radius:35px;
  padding:40px;
  margin-top:30px;
  margin-bottom:30px;
  border:2px solid #1f2a44;
}

.entry-label{
  font-size:18px;
  color:#8ea0c9;
  margin-bottom:15px;
  letter-spacing:2px;
}

#entrySignal{
  font-size:82px;
  font-weight:900;
  line-height:1;
  color:#ff5c6c;
  margin-bottom:40px;
}

.confidence-wrap{
  margin-top:10px;
}

.confidence-label{
  font-size:14px;
  color:#8ea0c9;
  margin-bottom:10px;
}

.confidence-bar-bg{
  width:100%;
  height:22px;
  background:#1a2236;
  border-radius:30px;
  overflow:hidden;
}

#confidenceBar{
  width:0%;
  height:100%;
  background:#57ff98;
  border-radius:30px;
  transition:0.4s;
}

#confidenceText{
  margin-top:10px;
  font-size:22px;
  font-weight:bold;
}


.entry-long{
  background:#0f3d2b !important;
  border-color:#57ff98 !important;
}

.entry-short{
  background:#3d1118 !important;
  border-color:#ff5c6c !important;
}

.entry-skip{
  background:#3d3411 !important;
  border-color:#ffd84d !important;
}

.entry-stop{
  background:#120509 !important;
  border-color:#ff2d55 !important;
}


.phase-panic{
  color:#ff5c6c;
}

.phase-up{
  color:#57ff98;
}

.phase-down{
  color:#ff884d;
}

.phase-dead{
  color:#8b93a7;
}


.alert-panel{
  background:#1a0910;
  border:2px solid #ff5c6c;
  border-radius:25px;
  padding:25px;
  margin-bottom:30px;
}

.alert-title{
  font-size:28px;
  font-weight:900;
  color:#ff5c6c;
  margin-bottom:20px;
}

.alert-item{
  background:#2b1018;
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
}

.alert-level{
  font-size:13px;
  color:#ffd84d;
  margin-bottom:6px;
}

.alert-head{
  font-size:24px;
  font-weight:900;
  margin-bottom:8px;
}

.alert-msg{
  opacity:0.8;
}


.power-panel{

  border:2px solid #24304f;
  border-radius:30px;
  padding:30px;
  margin-bottom:30px;
}

.power-title{

.power-name{

}

.power-meta{
  margin-top:8px;

}

}

}

#radarMarket{
  font-size:22px;
  opacity:0.7;
}

  padding:25px;
}

.exec-label{
  font-size:14px;
  color:#8ea0c9;
  margin-bottom:10px;
}

.exec-big{
  font-size:72px;
  font-weight:900;
  line-height:1;
}

.exec-mid{
  font-size:34px;
  font-weight:800;
}


.mode-panel{
  background:#111111;
  border:2px solid #444;
  border-radius:30px;
  padding:30px;
  margin-bottom:30px;
}

.mode-title{
  font-size:18px;
  opacity:0.7;
  margin-bottom:15px;
}

#modeStatus{
  font-size:58px;
  font-weight:900;
  margin-bottom:10px;
}

#modeDesc{
  opacity:0.8;
}


.tradeplan-panel{
  background:#08111f;
  border:2px solid #23426a;
  border-radius:35px;
  padding:35px;
  margin-bottom:30px;
}

.tradeplan-title{
  font-size:26px;
  font-weight:900;

}

.tradeplan-grid{
  display:grid;

  gap:20px;
}

.tradeplan-box{
  background:#101a30;
  border-radius:20px;
  padding:20px;
}

.tp-label{
  opacity:0.7;
  margin-bottom:10px;
}

.tp-big{
  font-size:36px;
  font-weight:900;
}


.today-panel{
  background:#050816;
  border-radius:40px;
  padding:40px;
  margin:20px;
  border:3px solid #26385f;
}

.today-title{
  font-size:32px;
  font-weight:900;
  opacity:.75;
  margin-bottom:25px;
}

.today-action{
  font-size:110px;
  font-weight:900;
  line-height:1;
  margin-bottom:35px;
  color:#ffd84d;
}

.today-box{
  background:#101a30;
  border-radius:28px;
  padding:28px;
}

.today-box div{
  display:flex;
  justify-content:space-between;
  font-size:34px;
  margin-bottom:22px;
}


.perf-panel{
  background:#081018;
  border-radius:35px;

}

.perf-box{

.ai-brain {
  border-radius: 30px;
  padding: 30px;
  box-shadow:
    0 0 20px rgba(255,255,255,0.12),
    0 0 70px rgba(255,60,60,0.18);
  transition: 0.5s;
}

.ai-extreme {
  animation: dangerPulse 1s infinite;
  border: 3px solid rgba(255,80,80,0.9);
}

@keyframes dangerPulse {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.02); opacity: 0.9; }
  100% { transform: scale(1); opacity: 1; }
}

<script>

async function loadJson(path,d={}){
  try{
    const r = await fetch(path + '?t=' + Date.now());
    return await r.json();
  }catch(e){
    return d;
  }
}

(async()=>{

  const ai =
    await loadJson('./ai_report.json',{});

  const plan =
    await loadJson('./trade_plan.json',{});

  const action =
    ai.weighted_agent_decision || '待機';

  document.getElementById('simpleAction')
    .innerText = action;

  document.getElementById('simpleConfidence')
    .innerText =
      (ai.confidence || 0) + '%';

})();
</script>


<script>
async function forcePerformance(){

  try{

    const res = await fetch('./performance_dashboard.json?t=' + Date.now());
    const perf = await res.json();

    const cards = document.querySelectorAll('.perf-box');

    if(cards.length >= 4){

      cards[0].innerHTML =
        '勝率<br><span style="font-size:42px;font-weight:900;">'
        + perf.win_rate + '%</span>';

      cards[1].innerHTML =
        '総損益<br><span style="font-size:42px;font-weight:900;">'
        + perf.total_pnl + '</span>';

      cards[2].innerHTML =
        'LONG勝率<br><span style="font-size:42px;font-weight:900;">'
        + perf.long_win_rate + '%</span>';

      cards[3].innerHTML =
        'SHORT勝率<br><span style="font-size:42px;font-weight:900;">'
        + perf.short_win_rate + '%</span>';
    }

    console.log("PERF OK", perf);

  }catch(e){

    console.log("PERF ERROR", e);

  }
}

forcePerformance();
</script>
