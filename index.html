<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>JP Market AI Dashboard</title>
  <style>
    body{
      margin:0;
      background:#041b63;
      color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
    }
    .wrap{
      max-width:860px;
      margin:0 auto;
      padding:20px 16px 40px;
    }
    .card{
      border-radius:28px;
      padding:24px;
      margin:18px 0;
      box-shadow:0 10px 30px rgba(0,0,0,.18);
    }
    .hero{
      color:#000;
      transition:background .2s ease;
    }
    .hero.yellow{ background:#f0c93d; }
    .hero.green{ background:#49d17d; }
    .hero.red{ background:#ff6b6b; }

    .panel{
      background:#0c2570;
      color:#fff;
    }
    .title{
      font-size:28px;
      font-weight:900;
      line-height:1.2;
      margin:0 0 16px;
    }
    .big{
      font-size:64px;
      font-weight:900;
      text-align:center;
      margin:26px 0 18px;
    }
    .mid{
      font-size:26px;
      font-weight:800;
      text-align:center;
      margin-bottom:18px;
    }
    .actionbox{
      background:#02020f;
      border-radius:24px;
      padding:20px;
      margin-top:18px;
      color:#fff;
    }
    .label{
      color:#f0c93d;
      font-size:18px;
      font-weight:900;
      margin-bottom:12px;
    }
    .action{
      font-size:30px;
      font-weight:900;
      margin-bottom:10px;
    }
    .line{
      font-size:20px;
      line-height:1.9;
      font-weight:700;
    }
    .ok{ color:#45e37b; }
    .alert{ color:#ff6b6b; }
    .muted{ opacity:.85; }
  
.entry-wrap{
  background:#0b1020;
  border-radius:35px;
  padding:40px;
  margin-top:30px;
  margin-bottom:30px;
  border:2px solid #1f2a44;
}

.entry-label{
  font-size:18px;
  color:#8ea0c9;
  margin-bottom:15px;
  letter-spacing:2px;
}

#entrySignal{
  font-size:82px;
  font-weight:900;
  line-height:1;
  color:#ff5c6c;
  margin-bottom:40px;
}

.confidence-wrap{
  margin-top:10px;
}

.confidence-label{
  font-size:14px;
  color:#8ea0c9;
  margin-bottom:10px;
}

.confidence-bar-bg{
  width:100%;
  height:22px;
  background:#1a2236;
  border-radius:30px;
  overflow:hidden;
}

#confidenceBar{
  width:0%;
  height:100%;
  background:#57ff98;
  border-radius:30px;
  transition:0.4s;
}

#confidenceText{
  margin-top:10px;
  font-size:22px;
  font-weight:bold;
}


.entry-long{
  background:#0f3d2b !important;
  border-color:#57ff98 !important;
}

.entry-short{
  background:#3d1118 !important;
  border-color:#ff5c6c !important;
}

.entry-skip{
  background:#3d3411 !important;
  border-color:#ffd84d !important;
}

.entry-stop{
  background:#120509 !important;
  border-color:#ff2d55 !important;
}


.phase-panic{
  color:#ff5c6c;
}

.phase-up{
  color:#57ff98;
}

.phase-down{
  color:#ff884d;
}

.phase-dead{
  color:#8b93a7;
}


.alert-panel{
  background:#1a0910;
  border:2px solid #ff5c6c;
  border-radius:25px;
  padding:25px;
  margin-bottom:30px;
}

.alert-title{
  font-size:28px;
  font-weight:900;
  color:#ff5c6c;
  margin-bottom:20px;
}

.alert-item{
  background:#2b1018;
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
}

.alert-level{
  font-size:13px;
  color:#ffd84d;
  margin-bottom:6px;
}

.alert-head{
  font-size:24px;
  font-weight:900;
  margin-bottom:8px;
}

.alert-msg{
  opacity:0.8;
}


.power-panel{
  background:#0d1324;
  border:2px solid #24304f;
  border-radius:30px;
  padding:30px;
  margin-bottom:30px;
}

.power-title{
  font-size:32px;
  font-weight:900;
  margin-bottom:25px;
}

.power-item{
  background:#131c31;
  border-radius:20px;
  padding:20px;
  margin-bottom:15px;
}

.power-name{
  font-size:24px;
  font-weight:900;
}

.power-meta{
  margin-top:8px;
  opacity:0.8;
}


.radar-panel{
  background:#081018;
  border:2px solid #1f3b5b;
  border-radius:35px;
  padding:35px;
  margin-bottom:30px;
}

.radar-title{
  font-size:20px;
  opacity:0.7;
  margin-bottom:20px;
}

#radarMode{
  font-size:72px;
  font-weight:900;
  line-height:1;
  margin-bottom:20px;
}

#radarMarket{
  font-size:22px;
  opacity:0.7;
}


.exec-panel{
  background:#050816;
  border:3px solid #1f3359;
  border-radius:40px;
  padding:40px;
  margin-bottom:35px;
}

.exec-title{
  font-size:22px;
  opacity:0.7;
  margin-bottom:25px;
  letter-spacing:2px;
}

.exec-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.exec-box{
  background:#0e1730;
  border-radius:25px;
  padding:25px;
}

.exec-label{
  font-size:14px;
  color:#8ea0c9;
  margin-bottom:10px;
}

.exec-big{
  font-size:72px;
  font-weight:900;
  line-height:1;
}

.exec-mid{
  font-size:34px;
  font-weight:800;
}


.mode-panel{
  background:#111111;
  border:2px solid #444;
  border-radius:30px;
  padding:30px;
  margin-bottom:30px;
}

.mode-title{
  font-size:18px;
  opacity:0.7;
  margin-bottom:15px;
}

#modeStatus{
  font-size:58px;
  font-weight:900;
  margin-bottom:10px;
}

#modeDesc{
  opacity:0.8;
}


.tradeplan-panel{
  background:#08111f;
  border:2px solid #23426a;
  border-radius:35px;
  padding:35px;
  margin-bottom:30px;
}

.tradeplan-title{
  font-size:26px;
  font-weight:900;
  margin-bottom:25px;
}

.tradeplan-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.tradeplan-box{
  background:#101a30;
  border-radius:20px;
  padding:20px;
}

.tp-label{
  opacity:0.7;
  margin-bottom:10px;
}

.tp-big{
  font-size:36px;
  font-weight:900;
}


.today-panel{
  background:#050816;
  border-radius:40px;
  padding:40px;
  margin:20px;
  border:3px solid #26385f;
}

.today-title{
  font-size:32px;
  font-weight:900;
  opacity:.75;
  margin-bottom:25px;
}

.today-action{
  font-size:110px;
  font-weight:900;
  line-height:1;
  margin-bottom:35px;
  color:#ffd84d;
}

.today-box{
  background:#101a30;
  border-radius:28px;
  padding:28px;
}

.today-box div{
  display:flex;
  justify-content:space-between;
  font-size:34px;
  margin-bottom:22px;
}


.perf-panel{
  background:#081018;
  border-radius:35px;
  padding:35px;
  margin:20px;
}

.perf-title{
  font-size:28px;
  font-weight:900;
  margin-bottom:25px;
}

.perf-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.perf-box{
  background:#121d30;
  border-radius:20px;
  padding:20px;
  font-size:28px;
}


.perf-panel{
  box-sizing:border-box;
  width:calc(100% - 40px);
  margin:20px;
  padding:35px;
  background:#071018;
  border-radius:36px;
  overflow:hidden;
}

.perf-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.perf-box{
  box-sizing:border-box;
  min-width:0;
  background:#121d30;
  border-radius:22px;
  padding:22px;
  font-size:28px;
  line-height:1.25;
}

.perf-box span{
  display:block;
  font-size:42px;
  font-weight:900;
  margin-top:8px;
  word-break:break-word;
}

.perf-sub{
  display:block;
  font-size:24px !important;
  font-weight:700 !important;
  opacity:.75;
  margin-top:8px;
}

</style>

<script>
async function loadJson(path, def={}){
  try{
    const r = await fetch(path + '?t=' + Date.now());
    return await r.json();
  }catch(e){
    return def;
  }
}

(async()=>{
  const perf = await loadJson('./performance_dashboard.json',{});
  const ai = await loadJson('./winrate_filter.json',{});
  
  
  const price = await loadJson('./live_price.json',{});
  const recovery = await loadJson('./recovery_mode.json',{});
  const consensus = await loadJson('./consensus.json',{});
  const sizing = await loadJson('./position_sizing.json',{});
        
  const pos = await loadJson('./shadow_position.json',{});
    

  document.getElementById('perfWR').innerText = (perf.win_rate || 0) + '%';
  document.getElementById('perfWL').innerText = (perf.wins || 0) + '勝' + (perf.losses || 0) + '敗';
  document.getElementById('perfPNL').innerText = perf.total_pnl || 0;
  document.getElementById('perfClosed').innerText = '決済 ' + (perf.closed || 0) + '件';
  document.getElementById('perfLONG').innerText = (perf.long_win_rate || 0) + '%';
  document.getElementById('perfSHORT').innerText = (perf.short_win_rate || 0) + '%';

  const d = ai.final_decision || ai.original_decision || 'SKIP';
  let jp = '待機';
  let qty = '0株';
  let order = 'なし';
  let stop = 'なし';
  let target = 'なし';

  if(d === 'LONG'){
    jp = '買い';
    qty = '1株';
    order = '成行';
    stop = '-1.5%';
    target = '+3.0%';
  }else if(d === 'SHORT' || ai.allowed_direction === 'SHORT_ONLY'){
    if(ai.blocked){
      jp = '待機';
    }else{
      jp = '売り';
      qty = '1株';
      order = '成行';
      stop = '-1.5%';
      target = '+3.0%';
    }
  }

  const action = document.getElementById('todayAction');
  action.innerText = jp;
  action.style.color = jp === '買い' ? '#57ff98' : jp === '売り' ? '#ff5c6c' : '#ffd84d';

  document.getElementById('todaySymbol').innerText = '1321 日経225ETF';
  document.getElementById('todaySize').innerText = qty;
  document.getElementById('todayOrder').innerText = order;
  document.getElementById('todayStop').innerText = stop;
  document.getElementById('todayTarget').innerText = target;
  
  
  document.getElementById('todayPrice').innerText = price.price ? price.price + '円' : '--';

  document.getElementById('recoveryMode').innerText =
    recovery.recovery_mode ? 'ON' : 'OFF';

  document.getElementById('consensusRate').innerText =
    consensus.ratio !== undefined ? Math.round(consensus.ratio * 100) + '%' : '--';

  document.getElementById('recommendedSize').innerText =
    sizing.recommended_size !== undefined ? sizing.recommended_size : '--';
        

  const current = Number(price.price || 0);
  const entry = Number(pos.entry_price || 0);
  const side = pos.side || null;
  const position = Number(pos.position || 0);

  let posText = 'なし';
  let entryText = '--';
  let unrealText = '--';

  if(side && position !== 0 && entry > 0 && current > 0){
    posText = side === 'SHORT' ? '売り保有中' : '買い保有中';
    entryText = entry + '円';

    let pnlPct = 0;

    if(side === 'SHORT'){
      pnlPct = ((entry - current) / entry) * 100;
    }else{
      pnlPct = ((current - entry) / entry) * 100;
    }

    unrealText = pnlPct.toFixed(2) + '%';
  }

  document.getElementById('todayPosition').innerText = posText;
  document.getElementById('todayEntry').innerText = entryText;
  document.getElementById('todayUnrealized').innerText = unrealText;

})();
</script>



<script>
(async function(){
  try{

    const set = (id, val) => {
      const el = document.getElementById(id);
      if(el) el.innerText = (val === undefined || val === null) ? "--" : val;
    };

    set("brainStatus", dash.brain_status);
    set("brainScore", dash.brain_score);
    set("productionLock", dash.production_locked ? "ON" : "OFF");
    set("allowRealTrade", dash.allow_real_trade ? "YES" : "NO");
    set("goLiveStatus", dash.go_live);

    set("replayKey", dash.replay_key);
    set("replayPolicyAction", dash.replay_policy_action);
    set("replayExpectancy", dash.replay_expectancy);
    set("replayExpectancyAction", dash.replay_expectancy_action);
    set("replaySizeMult", dash.replay_size_mult);

    set("weightedAgentDecision", dash.weighted_agent_decision);

    const votes = dash.weighted_votes || {};
    set("voteLong", votes.LONG);
    set("voteShort", votes.SHORT);
    set("voteSkip", votes.SKIP);
    set("voteHold", votes.HOLD);

    set("lockReasons", (dash.lock_reasons || []).join(" / "));
  }catch(e){
    console.log("dashboard_summary load error", e);
  }
})();
</script>

<script>
async function loadHumanTrade(){
  try{
    const h = await fetch("./human_trade_view.json?ts=" + Date.now()).then(r => r.json());
    const core = await fetch("./core_dashboard.json?ts=" + Date.now()).then(r => r.json());

    const setText = (id, v) => {
      const el = document.getElementById(id);
      if(el) el.innerText = (v === null || v === undefined || v === "") ? "--" : v;
    };

    const shadow = core.shadow_account || h.shadow || {};
    const readiness = core.readiness || h.readiness || {};

    setText("todayAction", h.today_action || (core.decision === "LONG" ? "買い" : core.decision === "SHORT" ? "売り" : "見送り"));
    setText("todaySymbol", core.symbol || h.symbol || "1321.T");
    setText("todayPrice", ((core.price ?? h.price ?? "--") + "円"));
    setText("todayQty", ((core.qty ?? h.qty ?? 0) + "株"));
    setText("todayAmount", ((core.amount ?? h.estimated_amount ?? 0) + "円"));
    setText("todayOrder", h.order_instruction || core.order_instruction || "なし");
    setText("todayStop", h.stop_loss || "-1.0%");
    setText("todayTake", h.take_profit || "2.2%");

    setText("shadowEquity", shadow.equity ?? "--");
    setText("shadowReturn", ((shadow.return_pct ?? 0) + "%"));
    setText("todayPosition", shadow.position ?? "なし");
    setText("todayEntry", shadow.position_qty ?? 0);
    setText("todayUnrealized", shadow.unrealized_yen ?? 0);

    const remain = readiness.remaining_to_real_review ?? "--";
    const reason = Array.isArray(h.reason_short) ? h.reason_short.join(" / ") : (h.reason_short || "--");
    setText("reasonText", reason);

    const headline = h.headline || `${h.today_action || "見送り"} / ${core.qty ?? h.qty ?? 0}株 / 約${core.amount ?? h.estimated_amount ?? 0}円 / 仮想 ${shadow.wins ?? 0}勝${shadow.losses ?? 0}敗 / 実弾まで残り${remain}`;
    setText("headline", headline);
  }catch(e){
    console.error("loadHumanTrade error", e);
  }
}

loadHumanTrade();
setInterval(loadHumanTrade, 60000);
</script>
